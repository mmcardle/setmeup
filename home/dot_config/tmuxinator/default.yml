# ~/.config/tmuxinator/default.yml — managed by chezmoi (setmeup)
#
# Usage:
#   mux start default <repo> <ticket>
# Example:
#   mux start default hub.sohonet.com FIL-1234
#
# Assumes worktrunk is configured so `wt switch --create <ticket>`
# inside ~/devel/<repo> materialises the worktree at ~/devel/<ticket>.
# See ~/.config/worktrunk/config.toml worktree-path template.

name: <%= @args[0] %>-<%= @args[1] %>
root: ~/devel/<%= @args[1] %>

on_project_first_start: (cd ~/devel/<%= @args[0] %> && wt switch --create <%= @args[1] %>)
on_project_restart:     (cd ~/devel/<%= @args[0] %> && wt switch <%= @args[1] %>)

windows:
  - editor:
      layout: main-vertical
      panes:
        - nvim
        -
  - server:
  - logs:
